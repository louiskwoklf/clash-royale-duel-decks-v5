<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Find four Clash Royale decks with no overlapping cards."
    />
    <title>Duel Deck Finder</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <!-- Top command bar: brand, meta window, primary action -->
      <header class="site-header">
        <a class="brand" href="/" aria-label="Duel Deck Finder home">
          <span class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </span>
          <span class="brand-name">
            <strong>Duel Deck</strong>
            <small>Finder</small>
          </span>
        </a>

        <div class="header-controls">
          <div class="meta-window-control">
            <span class="control-label">Meta window</span>
            <div class="range-tabs" role="group" aria-label="Meta date range">
              <button class="range-tab active" type="button" data-days="1" aria-pressed="true">
                1 day
              </button>
              <button class="range-tab" type="button" data-days="3" aria-pressed="false">
                3 days
              </button>
              <button class="range-tab" type="button" data-days="7" aria-pressed="false">
                7 days
              </button>
            </div>
          </div>

          <div class="panel-actions">
            <button class="refresh-button" id="refresh-button" type="button">
              <span class="refresh-icon" aria-hidden="true">↻</span>
              Find decks
            </button>
          </div>
        </div>
      </header>

      <main class="layout">
        <!-- Left column: loadout planner (the four deck slots) -->
        <aside class="planner-column">
          <div class="planner-header">
            <h2 class="planner-heading">Customise Your Decks</h2>
            <div class="planner-actions">
              <button class="planner-action-button" id="planner-include-button" type="button">
                + Include
              </button>
              <button class="planner-action-button exclude" id="planner-exclude-button" type="button">
                − Exclude
              </button>
            </div>
          </div>

          <div class="deck-slot-grid" id="deck-slot-grid" aria-label="Deck include filters"></div>

          <div
            class="planner-exclude-strip hidden"
            id="planner-exclude-strip"
            aria-label="Cards excluded from all decks"
          ></div>

          <p class="planner-hint">Select a deck to choose its cards.</p>
        </aside>

        <!-- Right column: search results -->
        <section class="results-column">
          <div class="results-toolbar">
            <div>
              <h2 id="results-heading">Duel decks</h2>
            </div>
            <div class="results-meta">
              <p id="results-summary"></p>
            </div>
          </div>

          <div class="stale-notice" aria-live="polite">
            <span class="stale-dot" aria-hidden="true"></span>
            Filters changed — press Find decks to update these results.
          </div>

          <div class="empty-state hidden" id="empty-state">
            <div class="empty-shield" aria-hidden="true">×</div>
            <h3 id="empty-title">No bundles found</h3>
            <p id="empty-message">Try another meta window or adjust deck filters.</p>
          </div>

          <div class="results-list" id="results-list" aria-live="polite"></div>

          <nav class="pagination hidden" id="pagination" aria-label="Bundle pages"></nav>
        </section>
      </main>

      <footer>
        <p>Data sourced from RoyaleAPI.</p>
      </footer>
    </div>

    <!-- Card picker pop-out: opened by selecting a deck slot -->
    <div class="filter-modal hidden" id="filter-modal">
      <div
        class="card-filter-editor"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filter-deck-name"
      >
        <div class="filter-editor-heading">
          <h3 id="filter-deck-name">Deck 1</h3>
          <div class="filter-heading-actions">
            <button class="clear-deck-button" id="clear-deck-button" type="button">
              Clear deck
            </button>
            <button
              class="modal-close-button"
              id="filter-close-button"
              type="button"
              aria-label="Close card picker"
            >
              ×
            </button>
          </div>
        </div>
        <div class="card-picker-controls">
          <div class="picker-mode-tabs" role="group" aria-label="Card filter mode">
            <button
              class="picker-mode-tab active"
              type="button"
              data-mode="include"
              aria-pressed="true"
            >
              Include
            </button>
            <button
              class="picker-mode-tab"
              type="button"
              data-mode="exclude"
              aria-pressed="false"
            >
              Exclude
            </button>
          </div>
        </div>
        <div class="card-picker-grid" id="card-picker-grid" aria-label="Card picker"></div>
        <div class="exclude-card-strip" id="exclude-card-strip"></div>
        <div class="filter-modal-footer">
          <button class="confirm-filters-button" id="filter-done-button" type="button">
            Done
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
