<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Find four Clash Royale decks with no overlapping cards."
    />
    <title>War Deck Finder</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="War Deck Finder home">
        <span class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <span>
          <strong>War Deck</strong>
          <small>Finder</small>
        </span>
      </a>
    </header>

    <main>
      <section class="card-builder-section" aria-label="Search controls">
        <div class="meta-window-control">
          <span class="control-label">Meta window</span>
          <div class="range-tabs" role="group" aria-label="Meta date range">
            <button class="range-tab active" type="button" data-days="1" aria-pressed="true">
              1 day
            </button>
            <button class="range-tab" type="button" data-days="3" aria-pressed="false">
              3 days
            </button>
            <button class="range-tab" type="button" data-days="7" aria-pressed="false">
              7 days
            </button>
          </div>
        </div>

        <div class="deck-slot-grid" id="deck-slot-grid" aria-label="Deck include filters"></div>

        <div class="card-filter-editor">
          <div class="filter-editor-heading">
            <h3 id="filter-deck-name">Deck 1</h3>
            <button class="clear-deck-button" id="clear-deck-button" type="button">
              Clear deck
            </button>
          </div>
          <div class="card-picker-controls">
            <div class="picker-mode-tabs" role="group" aria-label="Card filter mode">
              <button
                class="picker-mode-tab active"
                type="button"
                data-mode="include"
                aria-pressed="true"
              >
                Include
              </button>
              <button
                class="picker-mode-tab"
                type="button"
                data-mode="exclude"
                aria-pressed="false"
              >
                Exclude
              </button>
            </div>
          </div>
          <div class="card-picker-grid" id="card-picker-grid" aria-label="Card picker"></div>
          <div class="exclude-card-strip" id="exclude-card-strip"></div>
        </div>

        <div class="panel-actions">
          <button class="refresh-button" id="refresh-button" type="button">
            <span class="refresh-icon" aria-hidden="true">↻</span>
            Find decks
          </button>
        </div>
      </section>

      <section class="results-section" aria-labelledby="results-heading">
        <div class="results-toolbar">
          <div>
            <h2 id="results-heading">War deck bundles</h2>
          </div>
        </div>

        <div class="results-meta">
          <p id="results-summary"></p>
        </div>

        <div class="results-list" id="results-list" aria-live="polite"></div>

        <div class="empty-state hidden" id="empty-state">
          <div class="empty-shield" aria-hidden="true">×</div>
          <h3 id="empty-title">No bundles found</h3>
          <p id="empty-message">Try another meta window or adjust deck filters.</p>
        </div>

        <button class="load-more hidden" id="load-more" type="button">Show more bundles</button>
      </section>
    </main>

    <footer>
      <p>Data sourced from RoyaleAPI.</p>
    </footer>
  </body>
</html>
